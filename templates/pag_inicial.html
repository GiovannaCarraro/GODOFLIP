<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Godoflip</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/pag_inicial.css') }}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <!-- header -->
    <header>

        <div class="top-header">

            <div class="logo">
                <img src="static/logo/lo.png" alt="logo">
            </div>

            <h1 class="titulo">GODOFLIP</h1>

            <div class="icons">
                <i class="fa-solid fa-location-dot"></i>

                <a href="/login">
                    <i class="fa-regular fa-user"></i>
                </a>

                <a href="/favoritos">
                    <i class="fa-regular fa-heart"></i>
                </a>
            </div>
        </div>

        <nav>
            <a href="#">Início</a>
            <a href="#">Skates</a>
            <a href="#">Acessórios</a>
            <a href="#">Peças</a>
            <a href="#">Sobre Nós</a>
        </nav>

    </header>

    <!-- carrosel -->

    <section class="carousel">

        <div class="slides">

            <img src="img/skate1.jpg" alt="">
            <img src="img/skate2.jpg" alt="">
            <img src="img/skate3.jpg" alt="">
            <img src="img/skate4.jpg" alt="">

        </div>

    </section>

    <!-- destaques -->

    <section class="destaques">

        <h2>DESTAQUES</h2>

        <div class="cards">

            <div class="card">

                <img src="static/imagens_skates/skate_clean.png" alt="skate-minimalista">

                <div class="card-content">
                    <h3>Skate Minimal Rise</h3>
                    <p class="preco">R$ 349,90</p>

                    <button class="btn">Comprar</button>
                </div>

            </div>

            <div class="card">

                <img src="static/imagens_skates/skate_dragao.png" alt="skate-dragão">

                <div class="card-content">
                    <h3>Skate Supernova Fire</h3>
                    <p class="preco">R$ 189,90</p>

                    <button class="btn">Comprar</button>
                </div>

            </div>

            <div class="card">

                <img src="static/imagens_skates/skate_peixe.png" alt="">

                <div class="card-content">
                    <h3>Skate Sakura & Flow</h3>
                    <p class="preco">R$ 99,90</p>

                    <button class="btn">Comprar</button>
                </div>

            </div>

        </div>

    </section>

    <!-- footer -->

    <footer>

        <div class="contato">

            <h3>CONTATO:</h3>

            <p>📞 (16) 99999-9999</p>
            <p>📧 godoflip@gmail.com</p>

        </div>

        <div class="footer-logo">

            <img src="static/logo/logo.png" alt="logo">

        </div>

    </footer>

</body>

</html>
