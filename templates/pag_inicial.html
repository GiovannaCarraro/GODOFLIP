{% extends 'base.html' %}

{% block title %}
Godoflip
{% endblock %}

{% block content %}

<section class="carousel" aria-label="Galeria de Destaques">
    <div class="carousel-container">
        <div class="slides">
            <img class="slide active" src="{{ url_for('static', filename='carrossel/girls_skate.jpg') }}"
                alt="Banner 1">
            <img class="slide active" src="{{ url_for('static', filename='carrossel/omg-skate.jpg') }}"
                alt="Banner 2">
            <img class="slide active" src="{{ url_for('static', filename='carrossel/skate_preto.jpg') }}"
                alt="Banner 3">
            <img class="slide active" src="{{ url_for('static', filename='carrossel/skate-clean.jpg') }}"
                alt="Banner 4">
            <img class="slide active" src="{{ url_for('static', filename='carrossel/skate-mens.jpg') }}"
                alt="Banner 5">
            <img class="slide active" src="{{ url_for('static', filename='carrossel/skate-pe.jpg') }}"
                alt="Banner 6">
            <img class="slide active" src="{{ url_for('static', filename='carrossel/skates-diferentes.jpg') }}"
                alt="Banner 7">
            <img class="slide active" src="{{ url_for('static', filename='carrossel/wow.jpg') }}"
                alt="Banner 8">
        </div>

        <button class="carousel-btn prev-btn" aria-label="Slide anterior">&#10094;</button>
        <button class="carousel-btn next-btn" aria-label="Próximo slide">&#10095;</button>

        <div class="carousel-indicators">
            <span class="dot active" data-index="0"></span>
            <span class="dot" data-index="1"></span>
            <span class="dot" data-index="2"></span>
            <span class="dot" data-index="3"></span>
            <span class="dot" data-index="4"></span>
            <span class="dot" data-index="5"></span>
            <span class="dot" data-index="6"></span>
            <span class="dot" data-index="7"></span>
            <span class="dot" data-index="8"></span>
        </div>
    </div>
</section>

<section class="destaques">
    <h2>DESTAQUES</h2>

    <div class="cards">
                {% for produto in produtos_destaque %}
        <div class="card-produto">
            <img src="{{ url_for('static', filename=produto.url) }}" alt="{{ produto.nome }}">
            
            <h3>{{ produto.nome }}</h3>
            
            <p class="descricao-curta">{{ produto.desc_produto | truncate(60) }}</p>
            
            <span class="preco">R$ {{ produto.preco }}</span>
            
            <a href="/comprar/{{ produto.cod_produto }}" class="btn-comprar">Comprar</a>
        </div>
        {% endfor %}
    </div>
</section>

{% endblock %}

{% block js %}
<script src="{{ url_for('static', filename='js/carrosel.js') }}"></script>
{% endblock %}
