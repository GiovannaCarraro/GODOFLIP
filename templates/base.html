<head>

    <!-- define os caracteres e deixa funcionar acentos -->
    <meta charset="UTF-8">

    <!-- deixa o site responsivo em celular e tablet -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- titulo da pagina que pode ser alterado em outras paginas -->
    <title>{% block title %}Godoflip{% endblock %}</title>

    <!-- importa as fontes usadas no site -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Sedgwick+Ave&display=swap"
        rel="stylesheet">

    <!-- importa os icones do font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- css principal usado em todo o site -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pag_inicial.css') }}">

    <!-- bloco para adicionar css especifico de cada pagina -->
    {% block css %}{% endblock %}

</head>


    <!-- cabeçalho principal -->
    <header>

        <div class="top-header">

            <!-- logo da loja -->
            <div class="logo">
                <img src="{{ url_for('static', filename='logo/logo-hamster.png') }}" alt="logo">
            </div>

            <!-- nome da marca -->
            <h1 class="titulo">GODOFLIP</h1>

            <!-- icones de acesso rapido -->
            <div class="icons">

                <!-- pagina de login -->
                <a href="{{ url_for('login') }}">
                    <i class="fa-regular fa-user"></i>
                </a>

                <!-- pagina de favoritos -->
                <a href="{{ url_for('favoritos') }}">
                    <i class="fa-regular fa-heart"></i>
                </a>

                <!-- pagina de localização -->
                <a href="{{ url_for('localizacao') }}">
                    <i class="fa-solid fa-location-dot"></i>
                </a>

            </div>

        </div>
    </section>
</main>

        <!-- menu de navegação -->
        <nav>
            <a href="/">Início</a>
            <a href="/skates">Skates</a>
            <a href="/pag_acessorios">Acessórios</a>
            <a href="/pag_pecas">Peças</a>
            <a href="/sobre_nos">Sobre Nós</a>
        </nav>

    </header>

    <!-- conteudo que muda em cada pagina -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- rodape do site -->
    <footer>

        <!-- informações de contato -->
        <div class="contato">
            <h3>CONTATO:</h3>
            <p>📞 (16) 99999-9999</p>
            <p>📧 godoflip@gmail.com</p>
        </div>

        <!-- logo no rodape -->
        <div class="footer-logo">
            <img src="{{ url_for('static', filename='logo/logo-hamster.png') }}" alt="logo">
        </div>

    </footer>

    <!-- bloco para adicionar javascript especifico de cada pagina -->
    {% block js %}{% endblock %}

</body>

</html>
