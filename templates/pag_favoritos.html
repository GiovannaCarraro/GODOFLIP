{% extends 'base.html' %}

<!-- titulo da pagina -->
{% block title %}
Favoritos - Godoflip
{% endblock %}

<!-- css e fonte usados nesta pagina -->
{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pag_inicial.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
{% endblock %}

<!-- conteudo principal da pagina -->
{% block content %}

<!-- seção dos produtos favoritos -->
<section class="destaques">

    <h2>MEUS FAVORITOS ❤️</h2>

    <!-- área onde os cards serão exibidos -->
    <div class="cards">

        <!-- percorre todos os produtos favoritados -->
        {% for produto in favoritos %}

        <div class="card">

            <!-- imagem do produto -->
            <img src="{{ url_for('static', filename=produto['url']) }}" alt="{{ produto['nome'] }}">

            <div class="card-content">

                <!-- nome do produto -->
                <h3>{{ produto['nome'] }}</h3>

                <!-- preço -->
                <p class="preco">
                    R$ {{ produto['preco'] }}
                </p>

                <!-- botão para acessar a compra -->
                <a href="{{ url_for('comprar_pecas', id_produto=produto['cod_produto']) }}" class="btn"
                    style="text-decoration: none; display: inline-block; text-align: center;">
                    Comprar
                </a>

                <!-- botão para remover dos favoritos -->
                <button class="btn-remover">
                    Remover
                </button>

            </div>

        </div>

        {% endfor %}

    </div>

</section>

{% endblock %}
