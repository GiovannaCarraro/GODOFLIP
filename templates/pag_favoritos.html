{% extends 'base.html' %}

{% block title %}
Favoritos - Godoflip
{% endblock %}

{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/pag_inicial.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap"
    rel="stylesheet">
{% endblock %}

{% block content %}

<section class="destaques">

    <h2>MEUS FAVORITOS ❤️</h2>

    <div class="cards">

        {% for produto in favoritos %}

        <div class="card">

            <img src="{{ produto.imagem }}" alt="{{ produto.nome }}">

            <div class="card-content">

                <h3>{{ produto.nome }}</h3>

                <p class="preco">
                    R$ {{ produto.preco }}
                </p>

                <button class="btn">
                    Comprar
                </button>

                <button class="btn-remover">
                    Remover
                </button>

            </div>

        </div>

        {% endfor %}

    </div>

</section>

{% endblock %}
