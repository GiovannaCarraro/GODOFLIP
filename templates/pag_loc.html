<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GodoFlip - Localização</title>

    <!-- CSS principal (use o mesmo padrão do site todo) -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/loc.css') }}">

    <!-- Fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Potta+One&display=swap" rel="stylesheet">

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- HEADER PADRÃO (igual resto do site) -->
    <header>

        <div class="top-header">

            <div class="logo-area">
                <img src="{{ url_for('static', filename='img/hamster-logo.png') }}" alt="Logo GodoFlip">
                <h1>GODOFLIP</h1>
            </div>

            <div class="header-icons">
                <a href="{{ url_for('login') }}">
                    <i class="fa-regular fa-user"></i>
                </a>

                <a href="{{ url_for('favoritos') }}">
                    <i class="fa-regular fa-heart"></i>
                </a>

                <a href="{{ url_for('localizacao') }}">
                    <i class="fa-solid fa-location-dot"></i>
                </a>
            </div>

        </div>

        <nav>
            <a href="/pagina_inicial">Início</a>
            <a href="/skates">Skates</a>
            <a href="/pag_acessorios">Acessórios</a>
            <a href="#">Peças</a>
            <a href="/pag_sobrenos">Sobre Nós</a>
        </nav>

    </header>

    <!-- CONTEÚDO -->
    <main class="container">

        <section class="localizacao-card">

            <h1 class="titulo">Nossa Localização</h1>

            <p class="subtitulo">
                Venha nos visitar e conhecer a essência da GodoFlip.
            </p>

            <div class="info-local">
                <h2>📍 Araraquara - SP</h2>
                <p>Estamos localizados no coração da cidade, sempre prontos para te atender.</p>
            </div>

            <div class="mapa">
                <iframe
                    src="https://maps.google.com/maps?q=Araraquara%20SP&t=&z=13&ie=UTF8&iwloc=&output=embed"
                    allowfullscreen=""
                    loading="lazy">
                </iframe>
            </div>

        </section>

    </main>

</body>

</html>
