
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ produto[1] }} - GodoFlip</title>

    <link href="https://fonts.googleapis.com/css2?family=Potta+One&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/pag_comprar_skates.css') }}">
</head>

<body>

    <header>

        <div class="top-header">

            <div class="logo-area">

                <img src="{{ url_for('static', filename='logo/logohamster.png') }}"
                    alt="Logo GodoFlip">

                <h1>GODOFLIP</h1>

            </div>

            <div class="header-icons">

                <a href="/login">
                    <i class="fa-regular fa-user"></i>
                </a>

                <a href="/favoritos">
                    <i class="fa-regular fa-heart"></i>
                </a>

                <a href="/localizacao">
                    <i class="fa-solid fa-location-dot"></i>
                </a>

            </div>

        </div>

        <nav>

            <ul>

                <li>
                    <a href="/">Início</a>
                </li>

                <li>
                    <a href="/skates">Skates</a>
                </li>

                <li>
                    <a href="/favoritos">Favoritos</a>
                </li>

            </ul>

        </nav>

    </header>

    <main class="container">

<section class="produtos">

    <a href="{{ url_for('comprar') }}" class="card">
        <img src="static/imagens/skate1_angulo1.webp" alt="skate1_angulo1">
        <img src="static/imagens/skate1_angulo2.webp" alt="skate1_angulo2">
        <img src="static/imagens/prancha_lixa.png" alt="skate1_angulo3">

        <div class="card-content">
            <h3>Skate Street Black</h3>
            <p class="preco">R$ 300,00</p>
        </div>
    </a>

    <a href="{{ url_for('comprar') }}" class="card">
        <img src="static/imagens/skate2_angulo1.webp" alt="skate2_angulo1">
        <img src="static/imagens/skate2_angulo2.webp" alt="skate2_angulo2">
        <img src="static/imagens/prancha_lixa.png" alt="skate2_angulo3">

        <div class="card-content">
            <h3>Skate Fire Wheels</h3>
            <p class="preco">R$ 250,00</p>
        </div>
    </a>

    <a href="{{ url_for('comprar') }}" class="card">
        <img src="static/imagens/skate3_angulo01.webp" alt="skate3_angulo1">
        <img src="static/imagens/skate3_angulo2.webp" alt="skate3_angulo2">
        <img src="static/imagens/prancha_lixa.png" alt="skate3_angulo3">

        <div class="card-content">
            <h3>Godoflip Classic</h3>
            <p class="preco">R$ 220,00</p>
        </div>
    </a>

    <a href="{{ url_for('comprar') }}" class="card">
        <img src="static/imagens/skate4_angulo1.webp" alt="skate4_angulo1">
        <img src="static/imagens/skate4_angulo2.webp" alt="skate4_angulo2">
        <img src="static/imagens/prancha_lixa.png" alt="skate4_angulo3">

        <div class="card-content">
            <h3>Urban Skate Pro</h3>
            <p class="preco">R$ 380,00</p>
        </div>
    </a>

    <a href="{{ url_for('comprar') }}" class="card">
        <img src="static/imagens/skate5_angulo1.webp" alt="skate5_angulo1">
        <img src="static/imagens/skate5_angulo2.webp" alt="skate5_angulo2">
        <img src="static/imagens/prancha_lixa.png" alt="skate5_angulo3">

        <div class="card-content">
            <h3>Flip Dark Edition</h3>
            <p class="preco">R$ 365,00</p>
        </div>
    </a>

</section>



                    <div class="acoes">

                        <button class="btn btn-favorito">
                            ❤️ Favoritar
                        </button>

                        <button class="btn btn-carrinho">
                            🛒 Adicionar ao Carrinho
                        </button>

                    </div>

                </div>

            </div>

        </section>

    </main>

    <footer>

        <div class="footer-content">

            <div>

                <h3>Contato</h3>

                <p>contato@godoflip.com</p>

            </div>

            <div class="footer-logo">

                <img src="{{ url_for('static', filename='logo/logohamster.png') }}"
                    alt="Logo">

                <h3>GODOFLIP</h3>

            </div>

        </div>

    </footer>

</body>

</html>
