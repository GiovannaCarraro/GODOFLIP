<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skates</title>
   <link rel="stylesheet" href="{{ url_for('static', filename='css/pag_skates.css') }}">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>
    <header>
        <div class="top-header">

    <div class="logo">
        <img src="{{ url_for('static', filename='logo/logohamster.png') }}" alt="logo">
    </div>
            <h1 class="titulo">GODOFLIP</h1>
            <div class="icons">

                <a href="/login">
                    <i class="fa-regular fa-user"></i>
                </a>
                <a href="/favoritos">
                    <i class="fa-regular fa-heart"></i>
                </a>
                <a href="/carrinho">
                <i class="fa-solid fa-cart-shopping"></i>
            </a>  
            
            <a href="/localizacao">
            <i class="fa-solid fa-location-dot"></i>
            </a>
            
            </div>
        </div>

</div>
        <nav>
              <a href="/pagina_inicial">Início</a>
                <a href="/skates">Skates</a>
                <a href="/pag_acessorios">Acessórios</a>
                <a href="/pag_pecas">Peças</a>
                <a href="/sobre_nos">Sobre Nós</a>
        </nav>
    </header>

    <!-- titulo -->
    <section class="titulo-page">
        <h2>SKATES</h2>
        <p>Escolha o que mais te atrai.</p>
    </section>

<section class="produtos">
{% for produto in produtos %}

<div class="card-produto">

    <a href="{{ url_for('pag_comprar_skates', id_produto=produto.cod_produto) }}">
    <img src="{{ url_for('static', filename=produto.url) }}"
         alt="{{ produto.nome }}">
    </a>


    <h3>{{ produto.nome }}</h3>
    <p class="preco">R$ {{ produto.preco }}</p>
    <p>{{ produto.desc_produto }}</p>

</div>

{% endfor %}

</section>
       

    </section>


   

</body>
</html>
